<title>PPDDxYEC — แพลตฟอร์มจับคู่ Content Creator × SME ระยอง</title>
<style>
  :root{
    --bg:#FFFCFC; --surface:#FFFFFF; --surface-2:#FCF2F2; --surface-3:#F9E9E9;
    --ink:#211619; --ink-2:#655257; --ink-3:#98868B;
    --line:#F1E3E3; --line-2:#E6D2D2;
    --accent:#E30613; --accent-2:#B80510; --accent-soft:#FCE1E2; --accent-ink:#B00510;
    --good:#177A4C; --good-soft:#DBF1E4; --warn:#B4740B; --warn-soft:#FBECCF; --crit:#C33A34; --crit-soft:#F8DEDC;
    --st1:#F1681E; --st2:#C99A2E; --st3:#3E8FB0; --st4:#6A5AC9; --st5:#177A4C; --st0:#B0A79D;
    --radius:16px; --radius-sm:11px; --radius-xs:8px;
    --shadow:0 1px 2px rgba(34,26,18,.05), 0 10px 30px -14px rgba(34,26,18,.22);
    --shadow-sm:0 1px 2px rgba(34,26,18,.06);
    --maxw:1180px;
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,"Helvetica Neue","Noto Sans Thai",Arial,sans-serif;
    --mono:"SF Mono",ui-monospace,Menlo,"Roboto Mono",monospace;
  }
  *{box-sizing:border-box}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.55;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  h1,h2,h3,h4{margin:0;line-height:1.2;letter-spacing:-.01em;font-weight:800;text-wrap:balance}
  button{font-family:inherit}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 20px}
  .tnum{font-variant-numeric:tabular-nums}

  header{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--bg) 88%,transparent);
    backdrop-filter:saturate(160%) blur(12px);border-bottom:1px solid var(--line)}
  .nav{display:flex;align-items:center;gap:14px;padding:11px 20px;max-width:var(--maxw);margin:0 auto}
  .logo{display:flex;align-items:center;gap:9px;font-weight:850;letter-spacing:-.02em;font-size:17px;white-space:nowrap}
  .logo .mark{width:26px;height:26px;border-radius:8px;background:linear-gradient(150deg,var(--accent),var(--accent-2));
    display:grid;place-items:center;color:#fff;font-size:15px}
  .seg{display:flex;gap:4px;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:4px;position:relative}
  .seg button{border:0;background:transparent;color:var(--ink-2);font-weight:700;font-size:13.5px;padding:7px 15px;
    border-radius:999px;cursor:pointer;display:flex;align-items:center;gap:6px;position:relative;z-index:1;transition:color .2s}
  .seg button[aria-pressed="true"]{color:var(--accent-ink)}
  .seg-slider{position:absolute;top:4px;bottom:4px;left:0;width:0;background:var(--surface);border-radius:999px;
    box-shadow:var(--shadow-sm);z-index:0;transition:transform .28s cubic-bezier(.4,0,.2,1),width .28s cubic-bezier(.4,0,.2,1)}
  .seg .ic{font-size:14px}
  .lang button{padding:7px 12px;font-size:13px}
  .grow{margin-left:auto}
  .persona{font-size:12.5px;color:var(--ink-3);display:flex;align-items:center;gap:7px;white-space:nowrap}
  .persona b{color:var(--ink)}
  @media(max-width:760px){.persona{display:none}.seg button{padding:7px 11px}}

  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin:0 0 22px;position:relative}
  .tabs button{border:0;background:transparent;color:var(--ink-2);font-weight:700;font-size:14px;padding:12px 15px;
    cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color .2s}
  .tabs button[aria-pressed="true"]{color:var(--accent-ink)}
  .tabs button:hover{color:var(--ink)}
  .tab-slider{position:absolute;bottom:-1px;left:0;width:0;height:2.5px;background:var(--accent);border-radius:2px;z-index:1;
    transition:transform .28s cubic-bezier(.4,0,.2,1),width .28s cubic-bezier(.4,0,.2,1)}

  main{padding:24px 0 70px;min-height:70vh}
  .page-head{margin-bottom:20px}
  .page-head h2{font-size:23px}
  .page-head p{color:var(--ink-2);margin-top:5px;font-size:14.5px;max-width:74ch}

  .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px}
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:11px;font-weight:700;color:var(--ink-3);letter-spacing:.03em;padding-left:2px}
  .filters input,.filters select{border:1px solid var(--line-2);background:var(--surface);color:var(--ink);
    border-radius:10px;padding:9px 12px;font-size:14px;font-family:inherit;min-width:150px}
  .filters input:focus,.filters select:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}
  .searchf{flex:1;min-width:200px}
  .count{font-size:13px;color:var(--ink-3);margin-left:auto;padding-bottom:9px;white-space:nowrap}
  .selskills{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:-4px 0 16px}
  .selskills .lbl{font-size:12.5px;color:var(--ink-3);font-weight:700}
  .selchip{display:inline-flex;align-items:center;gap:7px;background:var(--accent-soft);color:var(--accent-ink);
    border:1px solid color-mix(in srgb,var(--accent) 32%,transparent);border-radius:999px;padding:5px 12px;
    font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}
  .selchip:hover{filter:brightness(.97)}
  .selchip .x{font-size:12px;opacity:.85}
  .clearsk{border:0;background:transparent;color:var(--ink-3);font-weight:700;font-size:12.5px;cursor:pointer;
    text-decoration:underline;font-family:inherit}
  .clearsk:hover{color:var(--ink)}
  .thsort{border:0;background:transparent;color:inherit;font:inherit;cursor:pointer;display:inline-flex;
    align-items:center;gap:5px;padding:0}
  .thsort:hover{color:var(--accent-ink)}
  .thsort.on{color:var(--accent-ink)}
  .thsort .ar{font-size:10px;opacity:.7}

  /* TABLE */
  .tablewrap{overflow:hidden;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-sm)}
  .tscroll{overflow-x:auto}
  table.ctable{width:100%;border-collapse:collapse;min-width:720px}
  .ctable thead th{text-align:left;font-size:11.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
    color:var(--ink-3);padding:13px 16px;border-bottom:1px solid var(--line);background:var(--surface-2);white-space:nowrap}
  .ctable th.right,.ctable td.right{text-align:right}
  .ctable tbody td{padding:12px 16px;border-bottom:1px solid var(--line);vertical-align:middle}
  .ctable tbody tr:last-child td{border-bottom:0}
  .ctable tbody tr:hover{background:var(--surface-2)}
  .cellname{display:flex;align-items:center;gap:11px}
  .cellname .nm{font-weight:800;font-size:14.5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .stars{color:var(--warn);font-weight:700;font-size:13px;white-space:nowrap}
  .subtle{font-size:12px;color:var(--ink-3)}
  .rate-cell{font-family:var(--mono);font-weight:800;font-size:14.5px}
  .avatar{width:40px;height:40px;border-radius:50%;flex:none;display:grid;place-items:center;color:#fff;font-weight:800;font-size:16px;position:relative;overflow:hidden}
  .av-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%}
  .badge-new{font-size:9.5px;font-weight:800;background:var(--good-soft);color:var(--good);padding:2px 6px;border-radius:999px;letter-spacing:.02em}
  .chips{display:flex;gap:5px;flex-wrap:wrap}
  .social{display:flex;gap:10px;flex-wrap:wrap}
  .soc{border:1px solid var(--line);border-radius:12px;padding:10px 14px;display:flex;flex-direction:column;gap:7px;min-width:100px}
  .soc-h{display:flex;align-items:center;gap:8px}
  .picon{width:23px;height:23px;border-radius:7px;display:inline-grid;place-items:center;flex:none}
  .picon svg{width:14px;height:14px;display:block}
  .soc .sp{font-size:11.5px;color:var(--ink-2);font-weight:700;letter-spacing:.01em}
  .soc b{font-size:17px;letter-spacing:-.01em}
  .ptag{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:12.5px;white-space:nowrap}
  .ptag-ic{width:18px;height:18px;border-radius:5px;display:inline-grid;place-items:center;flex:none}
  .ptag-ic svg{width:11px;height:11px;display:block}
  .chip{font-size:11.5px;font-weight:600;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-2);
    padding:3px 9px;border-radius:999px;white-space:nowrap}

  .btn{border:1px solid var(--accent);background:var(--accent);color:#fff;font-weight:700;font-size:13.5px;
    padding:9px 15px;border-radius:10px;cursor:pointer;transition:filter .12s;text-align:center}
  .btn:hover{filter:brightness(1.06)}
  .btn.ghost{background:transparent;color:var(--accent-ink);border-color:var(--line-2)}
  .btn.ghost:hover{background:var(--surface-2);filter:none}
  .btn.sm{padding:6px 12px;font-size:12.5px;border-radius:8px}
  .btn.block{width:100%}
  .btn:disabled{opacity:.5;cursor:default;filter:none}
  .btn.sec{background:var(--surface);color:var(--ink-2);border-color:var(--line-2)}

  .back{border:0;background:transparent;color:var(--ink-2);font-weight:600;font-size:14px;cursor:pointer;padding:6px 0;margin-bottom:12px}
  .back:hover{color:var(--accent-ink)}
  .detail{display:grid;grid-template-columns:1.5fr 1fr;gap:18px}
  @media(max-width:800px){.detail{grid-template-columns:1fr}.tabs{overflow-x:auto}}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-sm)}
  .dhead{display:flex;gap:16px;align-items:center;margin-bottom:16px}
  .dhead .avatar{width:66px;height:66px;font-size:26px}
  .dhead h2{font-size:22px}
  .dh-name{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .cmeta{font-size:12.5px;color:var(--ink-3)}
  .portfolio{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-top:8px}
  .pf{aspect-ratio:1;border-radius:10px;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:700;opacity:.92;text-align:center;padding:4px}
  .section-lbl{font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-3);margin:18px 0 8px}
  .review{border-top:1px solid var(--line);padding:11px 0;font-size:13.5px;color:var(--ink-2)}
  .review .rh{display:flex;justify-content:space-between;font-weight:700;color:var(--ink);font-size:13px;gap:8px}
  .kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px;gap:10px}
  .kv:last-child{border-bottom:0}.kv .k{color:var(--ink-3)}.kv .v{font-weight:700;text-align:right}
  .hire-box{position:sticky;top:78px}
  .big-rate{font-family:var(--mono);font-size:30px;font-weight:850;letter-spacing:-.02em}

  .deal{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-sm)}
  .deal+.deal{margin-top:11px}
  .deal-top{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .deal-title{font-weight:800;font-size:15px;flex:1;min-width:160px}
  .deal-title small{display:block;color:var(--ink-3);font-weight:600;font-size:12px;margin-top:1px}
  .money{font-family:var(--mono);text-align:right;font-size:13px}
  .money b{font-size:15px}.money small{color:var(--ink-3);display:block;font-size:11px}
  .sbadge{font-size:11.5px;font-weight:800;padding:4px 11px;border-radius:999px;white-space:nowrap}
  .deal-actions{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap}
  .track{display:flex;align-items:center;gap:0;margin-top:14px}
  .track .node{display:flex;flex-direction:column;align-items:center;gap:5px;flex:none;width:74px;text-align:center}
  .track .dot{width:20px;height:20px;border-radius:50%;background:var(--surface-2);border:2px solid var(--line-2);
    display:grid;place-items:center;font-size:10px;color:var(--ink-3);font-weight:800}
  .track .node.on .dot{background:var(--accent);border-color:var(--accent);color:#fff}
  .track .node.on .tl{color:var(--ink);font-weight:700}
  .track .tl{font-size:10.5px;color:var(--ink-3)}
  .track .bar{height:2px;background:var(--line-2);flex:1;min-width:8px;margin-top:-16px}
  .track .bar.on{background:var(--accent)}
  .track.cancelled{opacity:.7}
  .empty{text-align:center;padding:50px 20px;color:var(--ink-3)}
  .empty .e-ic{font-size:34px;opacity:.5}

  .persona-pick{display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--line);
    border-radius:12px;padding:11px 15px;margin-bottom:18px;flex-wrap:wrap}
  .persona-pick label{font-size:13px;font-weight:700;color:var(--ink-2)}
  .persona-pick select{border:1px solid var(--line-2);background:var(--surface);color:var(--ink);border-radius:9px;
    padding:8px 12px;font-size:14px;font-family:inherit;font-weight:700}
  .persona-pick .hint{font-size:12px;color:var(--ink-3);margin-left:auto}

  .grid{display:grid;gap:14px}
  .g-stat{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
  .g-kpi{grid-template-columns:repeat(auto-fill,minmax(232px,1fr))}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:17px 18px;box-shadow:var(--shadow-sm)}
  .stat .sl{font-size:12.5px;color:var(--ink-3);font-weight:600}
  .stat .sv{font-size:27px;font-weight:850;letter-spacing:-.02em;margin:5px 0 1px}
  .stat .sd{font-size:12px;color:var(--ink-3)}
  .stat .sv.accent{color:var(--accent-ink)}
  .stat.clickable{cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s}
  .stat.clickable:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--accent)}
  .stat.clickable:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .sd-lines{display:flex;flex-direction:column;gap:1px;margin-top:5px}
  .sd-lines span{font-size:11.5px}
  .stat.clickable .sd.sd-lines{color:var(--ink-3);font-weight:600}
  .ksub{font-size:11px;color:var(--ink-3);margin-top:2px}
  .rvbadge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;white-space:nowrap;display:inline-block}
  .board{display:grid;grid-template-columns:1.25fr 1fr;gap:16px;margin-top:16px}
  @media(max-width:800px){.board{grid-template-columns:1fr}}
  .chart-h{font-size:15px;font-weight:800;margin-bottom:4px}
  .chart-s{font-size:12.5px;color:var(--ink-3);margin-bottom:16px}
  .funnel{display:flex;flex-direction:column;gap:7px;margin-top:6px}
  .funnel .fr{display:flex;align-items:center;gap:12px}
  .funnel .fbar{height:30px;border-radius:8px;display:flex;align-items:center;padding:0 12px;color:#fff;
    font-size:12.5px;font-weight:700;min-width:44px;white-space:nowrap}
  .funnel .fl{font-size:13px;color:var(--ink-2);width:104px;flex:none}
  .rev-ring{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .rev-ring .txt .n{font-family:var(--mono);font-size:30px;font-weight:850;letter-spacing:-.02em}
  .rev-ring .txt .l{font-size:12.5px;color:var(--ink-3)}

  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 17px;
    box-shadow:var(--shadow-sm);position:relative}
  .kpi.clickable{cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s}
  .kpi.clickable:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--accent)}
  .kpi.clickable:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .kpi .pill{position:absolute;top:14px;right:14px;font-size:10px;font-weight:800;letter-spacing:.03em;
    text-transform:uppercase;padding:3px 8px;border-radius:999px}
  .p-good{background:var(--good-soft);color:var(--good)}.p-warn{background:var(--warn-soft);color:var(--warn)}.p-crit{background:var(--crit-soft);color:var(--crit)}
  .kpi .kl{font-size:12.5px;color:var(--ink-3);font-weight:600;padding-right:62px;min-height:32px}
  .kpi .kv2{font-size:26px;font-weight:850;margin:6px 0 2px;letter-spacing:-.02em}
  .kpi .kt{font-size:12px;color:var(--ink-3)}
  .kpi .km{height:7px;background:var(--surface-2);border-radius:99px;overflow:hidden;margin-top:11px}
  .kpi .km i{display:block;height:100%;border-radius:99px}
  .f-good{background:var(--good)}.f-warn{background:var(--warn)}.f-crit{background:var(--crit)}
  /* KPI scorecard rows */
  .kpi-seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:999px;padding:4px;gap:2px;margin-bottom:18px}
  .kpi-seg button{border:0;background:transparent;color:var(--ink-2);font-family:inherit;font-weight:700;font-size:13px;padding:7px 16px;border-radius:999px;cursor:pointer}
  .kpi-seg button[aria-pressed="true"]{background:var(--surface);color:var(--accent-ink);box-shadow:var(--shadow-sm)}
  .klist{border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);box-shadow:var(--shadow-sm);overflow:hidden}
  .krow{display:grid;grid-template-columns:4px 1.5fr auto 240px auto 18px;align-items:center;gap:16px;padding:14px 18px;border-bottom:1px solid var(--line)}
  .krow:last-child{border-bottom:0}
  .krow.clickable{cursor:pointer;transition:background .12s}
  .krow.clickable:hover{background:var(--surface-2)}
  .krow.clickable:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
  .kr-stripe{width:4px;height:36px;border-radius:2px}
  .kr-name{font-weight:700;font-size:14.5px}
  .kr-note{font-size:11.5px;color:var(--ink-3);margin-top:2px}
  .kr-val{font-family:var(--mono);font-size:20px;font-weight:800;white-space:nowrap;text-align:right}
  .kr-tgt{font-family:var(--sans);font-size:11px;color:var(--ink-3);font-weight:600}
  .kr-meter{display:flex;align-items:center;gap:10px}
  .kr-track{flex:1;height:9px;background:var(--surface-2);border-radius:99px;overflow:hidden}
  .kr-track i{display:block;height:100%;border-radius:99px}
  .kr-pct{font-size:12px;font-weight:700;width:44px;text-align:right;font-variant-numeric:tabular-nums;color:var(--ink-2)}
  .kr-chev{color:var(--ink-3);font-size:18px;text-align:center}
  @media(max-width:760px){
    .krow{grid-template-columns:4px 1fr auto;row-gap:11px;gap:12px}
    .kr-meter{grid-column:1 / -1;margin-left:20px}
    .kr-chev{display:none}
  }
  .bonus-lbl{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);
    margin:26px 0 12px;display:flex;align-items:center;gap:8px}
  .bonus-lbl::after{content:"";flex:1;height:1px;background:var(--line)}

  .pager{display:flex;align-items:center;justify-content:center;gap:10px;padding:13px 16px;border-top:1px solid var(--line);flex-wrap:wrap}
  .pager .pg{border:1px solid var(--line-2);background:var(--surface);color:var(--ink-2);font-family:inherit;font-weight:700;
    font-size:13px;padding:7px 12px;border-radius:9px;cursor:pointer}
  .pager .pg:hover:not(:disabled){color:var(--ink);background:var(--surface-2)}
  .pager .pg:disabled{opacity:.4;cursor:default}
  .pgnums{display:flex;gap:4px}
  .pgnum{border:1px solid transparent;background:transparent;color:var(--ink-2);font-family:inherit;font-weight:700;
    font-size:13px;min-width:32px;height:32px;border-radius:9px;cursor:pointer}
  .pgnum:hover{background:var(--surface-2);color:var(--ink)}
  .pgnum.on{background:var(--accent);color:#fff}
  .pgdots{color:var(--ink-3);align-self:center;padding:0 2px}
  @keyframes pgNext{from{opacity:.3;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
  @keyframes pgPrev{from{opacity:.3;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
  .pagewrap.pg-next{animation:pgNext .24s ease}
  .pagewrap.pg-prev{animation:pgPrev .24s ease}
  @media (prefers-reduced-motion:reduce){.pagewrap.pg-next,.pagewrap.pg-prev{animation:none}}

  .linkname{border:0;background:transparent;font-family:inherit;font-weight:800;font-size:14.5px;color:var(--ink);
    cursor:pointer;padding:0;text-align:left;display:inline-flex;align-items:center;gap:6px}
  .linkname:hover{color:var(--accent-ink);text-decoration:underline}
  .ctable.mini{min-width:520px}

  #modal:empty{display:none}

  smes[0].name={th:'ครัวป้าแดง ซีฟู้ดบ้านเพ',en:'Pa Daeng Seafood, Ban Phe'}; smes[0].catIdx=0; smes[0].budget=50000; smes[0].review='approved';
  creators[0].name='มายด์'; creators[0].skillIdx=[0,6,3]; creators[0].rate=45000; creators[0].provIdx=0; creators[0].avail=true; creators[0].rating='4.8'; creators[0].review='approved'; creators[0].isNew=false; creators[0].subs=[{p:'TikTok',n:320000},{p:'Instagram',n:85000},{p:'YouTube',n:120000}]; creators[0].photo='https://randomuser.me/api/portraits/women/68.jpg';

  var PTITLE=[{th:'แคมเปญเปิดร้าน',en:'Grand Opening'},{th:'รีวิวเมนูใหม่',en:'New Menu Review'},{th:'โปรโมชั่นเทศกาล',en:'Festival Promo'},{th:'คอนเทนต์แบรนด์ประจำเดือน',en:'Monthly Brand Content'},{th:'ทัวร์ร้าน / สถานที่',en:'Venue Tour'},{th:'สัมภาษณ์เจ้าของธุรกิจ',en:'Owner Interview'},{th:'รีวิวสินค้าใหม่',en:'New Product Review'}];

  // ---------- PAGINATION ----------
  var PER=10;
  function pageInfo(key,total,per){per=per||PER;var pages=Math.max(1,Math.ceil(total/per));if(state.page[key]>pages)state.page[key]=pages;if(state.page[key]<1)state.page[key]=1;return {pages:pages,p:state.page[key],per:per};}
  function pgBtn(key,i,cur){return '<button class="pgnum'+(i===cur?' on':'')+'" data-act="page" data-key="'+key+'" data-p="'+i+'">'+i+'</button>';}
  function pager(key,total,per){
    var pi=pageInfo(key,total,per);if(pi.pages<=1)return '';
    var p=pi.p,pages=pi.pages;
    var h='<div class="pager"><button class="pg" data-act="page" data-key="'+key+'" data-p="'+(p-1)+'"'+(p<=1?' disabled':'')+'>‹ '+L('ก่อนหน้า','Prev')+'</button><div class="pgnums">';
    var start=Math.max(1,p-2),end=Math.min(pages,p+2);
    if(start>1){h+=pgBtn(key,1,p);if(start>2)h+='<span class="pgdots">…</span>';}
    for(var i=start;i<=end;i++)h+=pgBtn(key,i,p);
    if(end<pages){if(end<pages-1)h+='<span class="pgdots">…</span>';h+=pgBtn(key,pages,p);}
    h+='</div><button class="pg" data-act="page" data-key="'+key+'" data-p="'+(p+1)+'"'+(p>=pages?' disabled':'')+'>'+L('ถัดไป','Next')+' ›</button></div>';
    return h;
  }
  // Paginated table with slide-refresh support (no full re-render on page change)
  var REFRESH={};
  function pagedTable(key,tableClass,thead,arr,per,rowFn){
    REFRESH[key]=function(){
      var pi=pageInfo(key,arr.length,per),start=(pi.p-1)*per,slice=arr.slice(start,start+per),body='';
      for(var i=0;i<slice.length;i++)body+=rowFn(slice[i],start+i);
      return '<div class="tscroll"><table class="ctable'+(tableClass?' '+tableClass:'')+'"><thead>'+thead+'</thead><tbody>'+body+'</tbody></table></div>'+pager(key,arr.length,per);
    };
    return '<div class="pagewrap" data-pk="'+key+'">'+REFRESH[key]()+'</div>';
  }

  function rag(r){return r>=1?'good':r>=0.7?'warn':'crit';}
  function kpiCard(l,val,tgt,ratio,force,note,link){var st=force||rag(ratio);var lbl=st==='good'?L('ตามเป้า','On track'):st==='warn'?L('เฝ้าระวัง','Watch'):L('ต้องเร่ง','Behind');
    var attr=link?' class="kpi clickable" data-act="go" data-go="'+link.go+'"'+(link.fkey?' data-fkey="'+link.fkey+'" data-fval="'+link.fval+'"':'')+' role="button" tabindex="0"':' class="kpi"';
    return '<div'+attr+'><span class="pill p-'+st+'">'+lbl+'</span><div class="kl">'+l+'</div><div class="kv2 tnum">'+val+'</div>'+(note?'<div class="ksub">'+note+'</div>':'')+'<div class="kt">'+tgt+'</div><div class="km"><i class="f-'+st+'" style="width:'+Math.min(100,ratio*100).toFixed(0)+'%"></i></div></div>';}
  function kpiRow(o){
    var st=o.force||rag(o.ratio),lbl=st==='good'?L('ตามเป้า','On track'):st==='warn'?L('เฝ้าระวัง','Watch'):L('ต้องเร่ง','Behind');
    var pct=Math.round(o.ratio*100),lk=o.link;
    var attr=lk?' class="krow clickable" data-act="go" data-go="'+lk.go+'"'+(lk.fkey?' data-fkey="'+lk.fkey+'" data-fval="'+lk.fval+'"':'')+' role="button" tabindex="0"':' class="krow"';
    return '<div'+attr+'><div class="kr-stripe f-'+st+'"></div>'
      +'<div class="kr-main"><div class="kr-name">'+o.l+'</div>'+(o.note?'<div class="kr-note">'+o.note+'</div>':'')+'</div>'
      +'<div class="kr-val tnum">'+o.val+' <span class="kr-tgt">· '+o.tgt+'</span></div>'
      +'<div class="kr-meter"><div class="kr-track"><i class="f-'+st+'" style="width:'+Math.min(100,pct)+'%"></i></div><span class="kr-pct">'+pct+'%</span></div>'
      +'<div><span class="rvbadge p-'+st+'">'+lbl+'</span></div>'
      +(lk?'<div class="kr-chev">›</div>':'<div></div>')+'</div>';
  }

  function positionSliders(){
    ['roles','lang'].forEach(function(id){
      var c=document.getElementById(id);if(!c)return;
      var s=c.querySelector('.seg-slider'),a=c.querySelector('button[aria-pressed="true"]');
      if(!s||!a)return;
      if(!state._segReady)s.style.transition='none';
      s.style.width=a.offsetWidth+'px';s.style.transform='translateX('+a.offsetLeft+'px)';
      if(!state._segReady){void s.offsetWidth;s.style.transition='';}
    });
    state._segReady=true;
    var ts=document.querySelector('.tab-slider'),ta=document.querySelector('.tabs button[aria-pressed="true"]');
    if(ts&&ta){
      var nl=ta.offsetLeft,nw=ta.offsetWidth,anim='transform .28s cubic-bezier(.4,0,.2,1),width .28s cubic-bezier(.4,0,.2,1)';
      if(state._tabPos&&state._tabPos.l!==nl){
        ts.style.transition='none';ts.style.transform='translateX('+state._tabPos.l+'px)';ts.style.width=state._tabPos.w+'px';
        void ts.offsetWidth;ts.style.transition=anim;
        ts.style.transform='translateX('+nl+'px)';ts.style.width=nw+'px';
      }else{
        ts.style.transition='none';ts.style.transform='translateX('+nl+'px)';ts.style.width=nw+'px';void ts.offsetWidth;ts.style.transition=anim;
      }
      state._tabPos={l:nl,w:nw};
    }

    document.body.style.overflow='hidden';
    var html='';
    for(var i=0;i<state.modals.length;i++){var top=i===state.modals.length-1;
      html+='<div class="overlay'+(top?' overlay-top':'')+'"'+(top?' id="overlay"':'')+' style="z-index:'+(90+i*3)+'"><div class="modal-box" role="dialog" aria-modal="true">'

  function actCreateProject(){
    var t=(document.getElementById('npTitle').value||'').trim();
    var skills=[].slice.call(document.querySelectorAll('.npSkill:checked')).map(function(x){return +x.value;});
    var budget=+document.getElementById('npBudget').value||0,need=+document.getElementById('npNeed').value||0;

  function handleAct(b){
    var a=b.dataset.act;
    if(a==='open'){state.page.pfolio=1;state.modals=[{type:'creator',id:b.dataset.id}];renderModal();}
    else if(a==='openStack'){state.page.pfolio=1;state.modals.push({type:'creator',id:b.dataset.id});renderModal();}
    else if(a==='openSme'){state.page.smedeals=1;state.modals=[{type:'sme',id:b.dataset.id}];renderModal();}
    else if(a==='openDeal'){state.modals=[{type:'deal',id:b.dataset.id}];renderModal();}
    else if(a==='openProject'){state.modals=[{type:'project',id:b.dataset.id}];renderModal();}
    else if(a==='newProject'){state.modals=[{type:'newProject'}];renderModal();}
    else if(a==='createProject'){actCreateProject();}
    else if(a==='apply'){actApply(b.dataset.id);}
    else if(a==='kpiView'){state.kpiView=b.dataset.v;render();}
    else if(a==='go'){var g=b.dataset.go;
      if(b.dataset.fkey){var fk=b.dataset.fkey,fv=b.dataset.fval;
        if(fk==='smeReview')state.smeReview=fv;else if(fk==='creReview')state.creReview=fv;else if(fk==='contentFilter')state.contentFilter=fv;}
      state.tab.admin=g;if(state.page[g]!==undefined)state.page[g]=1;state.modals=[];render();}
    else if(a==='closeModal'){state.modals.pop();renderModal();}
    else if(a==='invite'){actInvite(b.dataset.id);}
    else if(a==='deal'){actDeal(b.dataset.deal,b.dataset.to);}
    else if(a==='page'){
      var key=b.dataset.key,np=+b.dataset.p,dir=np>state.page[key]?'pg-next':'pg-prev';
      state.page[key]=np;
      var wrap=document.querySelector('[data-pk="'+key+'"]');
      if(wrap&&REFRESH[key]){wrap.innerHTML=REFRESH[key]();wrap.classList.remove('pg-next','pg-prev');void wrap.offsetWidth;wrap.classList.add(dir);}
      else render();
    }
    else if(a==='rmSkill'){var i=+b.dataset.i;state.filters.skills=state.filters.skills.filter(function(x){return x!==i;});state.page.browse=1;render();}
    else if(a==='clearSkills'){state.filters.skills=[];state.page.browse=1;render();}
    else if(a==='sort'){state.ratingSort=state.ratingSort==='desc'?'asc':state.ratingSort==='asc'?null:'desc';render();}
  }

    var b=e.target.closest('[data-act],[data-tab]');if(!b)return;
    if(b.dataset.tab){var nt=b.dataset.tab;state.tab[state.role]=nt;
      if(nt==='smes')state.smeReview='all';else if(nt==='creators')state.creReview='all';else if(nt==='contents')state.contentFilter='all';
      if(state.page[nt]!==undefined)state.page[nt]=1;render();return;}
    handleAct(b);
  });
  document.getElementById('modal').addEventListener('click',function(e){
    if(e.target.id==='overlay'){state.modals.pop();renderModal();return;}
    var b=e.target.closest('[data-act]');if(b)handleAct(b);
  });
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&state.modals.length){state.modals.pop();renderModal();}});
  document.addEventListener('error',function(e){var t=e.target;if(t&&t.classList&&t.classList.contains('av-img'))t.style.display='none';},true);
  function onFilter(el){var key=el.dataset.input;if(!key)return;
    if(key==='creatorId'){state.creatorId=el.value;state.page.inbox=1;render();return;}
    if(key==='contentFilter'){state.contentFilter=el.value;state.page.contents=1;render();return;}
    if(key==='smeReview'){state.smeReview=el.value;state.page.smes=1;render();return;}
    if(key==='creReview'){state.creReview=el.value;state.page.creators=1;render();return;}
    if(key==='addSkill'){if(el.value!==''){state.filters.skills.push(+el.value);state.page.browse=1;}render();return;}
    if(key in state.filters){state.filters[key]=el.value;state.page.browse=1;if(key==='q')state.focusSearch=true;render();}}
  document.getElementById('app').addEventListener('input',function(e){var el=e.target.closest('[data-input]');if(el&&el.dataset.input==='q')onFilter(el);});
  document.getElementById('app').addEventListener('change',function(e){var el=e.target.closest('select[data-input]');if(el)onFilter(el);});
  document.getElementById('app').addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){var b=e.target.closest('[data-act="go"]');if(b){e.preventDefault();handleAct(b);}}});

  render();
})();
</script>
